version: '2.0'

services:
  phaserquest:
    tty: true
    stdin_open: true
    build:
      context: .
      dockerfile: Dockerfile
    command: node server.js -p 8080
    ports:
      - '8080:8080'
    volumes:
      - './assets:/usr/src/app/assets'
      - './js:/usr/src/app/js'
      - './server.js:/usr/src/app/server.js'
      - './package.json:/usr/src/app/package.json'
      - './index.html:/usr/src/app/index.html'
